name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deployments are handled by Cloudflare Pages native GitHub integration.
# CF Pages watches this repo and deploys automatically on push to main.

jobs:
  lint:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check index.html exists
        run: test -f index.html && echo "index.html OK"
